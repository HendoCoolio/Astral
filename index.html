<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astral</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #020408 0%, #000000 70%);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(32, 60, 120, 0.18) 0%, rgba(0,0,0,0) 35%),
        radial-gradient(circle at center, rgba(60, 100, 190, 0.08) 0%, rgba(0,0,0,0) 55%);
      pointer-events: none;
      z-index: 0;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* TOP BAR */
    .top-bar-wrap {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 18px;
      background: rgba(22, 22, 22, 0.92);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .top-icon-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .top-icon-btn svg {
      width: 28px;
      height: 28px;
      fill: #f2f2f2;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .top-icon-btn:hover {
      background: rgba(255,255,255,0.04);
      transform: scale(1.08);
      box-shadow:
        0 0 0 1px rgba(90,150,255,0.20),
        0 0 16px rgba(90,150,255,0.16);
    }

    .top-icon-btn:hover svg {
      transform: scale(1.08);
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.30))
        drop-shadow(0 0 12px rgba(90,150,255,0.22));
    }

    .center-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: opacity 0.35s ease;
      padding: 20px;
    }

    .title {
      font-size: clamp(72px, 12vw, 130px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;

      background: linear-gradient(
        90deg,
        #10264d 0%,
        #1c4d95 25%,
        #4f8df0 50%,
        #1c4d95 75%,
        #10264d 100%
      );
      background-size: 220% 220%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

      filter: drop-shadow(0 0 10px rgba(42, 92, 185, 0.45))
              drop-shadow(0 0 24px rgba(42, 92, 185, 0.28))
              drop-shadow(0 0 52px rgba(42, 92, 185, 0.16));

      animation: titleFlow 8s ease-in-out infinite;
      user-select: none;
    }

    .subtitle {
      font-size: clamp(10px, 1.1vw, 14px);
      font-weight: 500;
      letter-spacing: 0.3px;
      opacity: 0.88;
      user-select: none;

      background: linear-gradient(
        90deg,
        #10264d 0%,
        #1c4d95 25%,
        #4f8df0 50%,
        #1c4d95 75%,
        #10264d 100%
      );
      background-size: 220% 220%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

      filter: drop-shadow(0 0 8px rgba(42, 92, 185, 0.28))
              drop-shadow(0 0 18px rgba(42, 92, 185, 0.14));

      animation: titleFlow 8s ease-in-out infinite;
    }

    @keyframes titleFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .search-wrap {
      width: min(620px, 84vw);
      margin-top: 8px;
      position: relative;
    }

    .search {
      width: 100%;
      padding: 15px 22px;
      border-radius: 999px;
      border: none;
      outline: none;
      background: #121212;
      color: white;
      font-size: 16px;

      box-shadow:
        0 0 0 1px rgba(60,120,255,0.28),
        0 0 14px rgba(60,120,255,0.26),
        0 0 30px rgba(60,120,255,0.14);

      transition: all 0.25s ease;
    }

    .search::placeholder {
      color: #9a9a9a;
    }

    .search:focus {
      box-shadow:
        0 0 0 1px rgba(90,150,255,0.48),
        0 0 20px rgba(90,150,255,0.42),
        0 0 40px rgba(90,150,255,0.22);
      transform: scale(1.01);
    }

    /* browser area */
    #browserWrap {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 10;
      background: #000;
      flex-direction: column;
    }

    #topbar {
      height: 52px;
      background: rgba(10, 10, 10, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .topbtn {
      background: #121212;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;

      box-shadow:
        0 0 0 1px rgba(60,120,255,0.22),
        0 0 10px rgba(60,120,255,0.18);
      transition: 0.2s ease;
    }

    .topbtn:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 0 1px rgba(90,150,255,0.4),
        0 0 16px rgba(90,150,255,0.3);
    }

    #browserBar {
      flex: 1;
      background: #121212;
      border: none;
      outline: none;
      color: white;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 0 1px rgba(60,120,255,0.18);
    }

    #browser {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      flex: 1;
    }
  </style>
</head>
<body>

  <canvas id="snow"></canvas>

  <!-- TOP BAR -->
  <div class="top-bar-wrap">
    <div class="top-bar">
      <button class="top-icon-btn" onclick="window.open('https://sites.google.com/view/Astral-math-tutoring/games', '_blank')" aria-label="Games">
        <!-- Controller Icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 7C4.79 7 3 8.79 3 11v2c0 2.21 1.79 4 4 4h1.38c.8 0 1.55.38 2.02 1.03l.8 1.08c.4.54 1.2.54 1.6 0l.8-1.08c.47-.65 1.22-1.03 2.02-1.03H17c2.21 0 4-1.79 4-4v-2c0-2.21-1.79-4-4-4H7zm2.25 3.25h1.5v1.5h-1.5v1.5h-1.5v-1.5h-1.5v-1.5h1.5v-1.5h1.5v1.5zm7.25 1a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zm-2.5-2a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5z"/>
        </svg>
      </button>

      <button class="top-icon-btn" onclick="window.open('https://sites.google.com/view/Astral-math-tutoring/apps', '_blank')" aria-label="Apps">
        <!-- Grid Icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="center-wrap" id="menu">
    <div class="title">Astral</div>
    <div class="subtitle">brought to you by the creator of quantum arcade</div>

    <div class="search-wrap">
      <input class="search" id="searchInput" placeholder="search the web" />
    </div>
  </div>

  <div id="browserWrap">
    <div id="topbar">
      <button class="topbtn" id="backBtn">← Back</button>
      <button class="topbtn" id="homeBtn">Home</button>
      <input id="browserBar" placeholder="Enter a URL or search..." />
    </div>
    <iframe id="browser"></iframe>
  </div>

  <script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");

    let w, h, particles = [];

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      createParticles();
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createParticles() {
      const amount = Math.floor((w * h) / 14000);
      particles = [];

      for (let i = 0; i < amount; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: random(1, 2.8),
          speedY: random(0.25, 0.85),
          swayAmount: random(0.6, 2.4),
          swaySpeed: random(0.008, 0.03),
          drift: random(-0.15, 0.15),
          alpha: random(0.18, 0.75),
          offset: Math.random() * Math.PI * 2
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, w, h);

      for (let p of particles) {
        p.y += p.speedY;
        p.x += Math.sin(p.y * p.swaySpeed + p.offset) * p.swayAmount + p.drift;

        if (p.y > h + 10) {
          p.y = -10;
          p.x = Math.random() * w;
        }

        if (p.x < -20) p.x = w + 20;
        if (p.x > w + 20) p.x = -20;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(255,255,255,0.25)";
        ctx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener("resize", resize);
    resize();
    drawParticles();

    // ===== SEARCH / BROWSER SYSTEM (left untouched for later) =====
    const searchInput = document.getElementById("searchInput");
    const browser = document.getElementById("browser");
    const browserWrap = document.getElementById("browserWrap");
    const browserBar = document.getElementById("browserBar");
    const menu = document.getElementById("menu");
    const backBtn = document.getElementById("backBtn");
    const homeBtn = document.getElementById("homeBtn");

    function isLikelyURL(str) {
      return str.includes(".") || str.startsWith("http://") || str.startsWith("https://");
    }

    function goTo(input) {
      let value = input.trim();
      if (!value) return;

      let finalUrl;

      if (isLikelyURL(value)) {
        finalUrl = value.startsWith("http://") || value.startsWith("https://")
          ? value
          : "https://" + value;
      } else {
        finalUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(value);
      }

      browser.src = "/service/" + encodeURIComponent(finalUrl);
      browserBar.value = finalUrl;

      browserWrap.style.display = "flex";
      menu.style.display = "none";
    }

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") goTo(searchInput.value);
    });

    browserBar.addEventListener("keydown", (e) => {
      if (e.key === "Enter") goTo(browserBar.value);
    });

    backBtn.addEventListener("click", () => {
      try {
        browser.contentWindow.history.back();
      } catch {}
    });

    homeBtn.addEventListener("click", () => {
      browserWrap.style.display = "none";
      menu.style.display = "flex";
      browser.src = "about:blank";
      browserBar.value = "";
      searchInput.value = "";
    });
  </script>
</body>
</html>

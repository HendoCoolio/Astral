<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astral</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center,#020408 0%,#000 70%);
}

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,rgba(32,60,120,0.18),transparent 35%),
radial-gradient(circle at center,rgba(60,100,190,0.08),transparent 55%);
z-index:0;
}

canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* 🔥 FULL WIDTH BAR */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:80px;

display:flex;
align-items:center;
justify-content:center;
gap:20px;

background:rgba(20,20,20,0.95);
backdrop-filter:blur(10px);

z-index:5;
}

/* ICON BUTTON */
.bar-btn{
width:60px;
height:60px;
border:none;
border-radius:16px;
background:transparent;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.bar-btn img{
width:38px;
height:38px;
object-fit:contain;
transition:0.2s ease;
}

/* HOVER */
.bar-btn:hover img{
transform:scale(1.25);
}

/* CENTER */
.center-wrap{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
text-align:center;
}

.title{
font-size:clamp(72px,12vw,130px);
font-weight:800;
background:linear-gradient(90deg,#10264d,#1c4d95,#4f8df0,#1c4d95,#10264d);
background-size:220%;
-webkit-background-clip:text;
color:transparent;
animation:flow 8s ease-in-out infinite;
}

.subtitle{
font-size:14px;
opacity:0.85;
background:linear-gradient(90deg,#10264d,#4f8df0,#10264d);
-webkit-background-clip:text;
color:transparent;
}

@keyframes flow{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

.search{
width:min(600px,80vw);
padding:15px 20px;
border-radius:999px;
border:none;
outline:none;
background:#121212;
color:white;
font-size:16px;
box-shadow:
0 0 0 2px rgba(60,120,255,0.35),
0 0 20px rgba(60,120,255,0.25);
}

/* BROWSER */
#browserWrap{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
z-index:10;
}

#browserTop{
height:50px;
background:#111;
display:flex;
align-items:center;
padding:0 10px;
}

#browser{
flex:1;
width:100%;
border:none;
}

.top-btn{
padding:8px 14px;
border:none;
border-radius:10px;
background:#121212;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<!-- 🔥 FULL WIDTH BAR -->
<div class="bottom-bar">
  <button class="bar-btn" onclick="window.location.href='games.html'">
    <img src="icons/games icon.png">
  </button>
</div>

<div class="center-wrap" id="home">
  <div class="title">Astral</div>
  <div class="subtitle">brought to you by the creator of quantum arcade</div>
  <input class="search" id="searchBox" placeholder="search the web">
</div>

<div id="browserWrap">
  <div id="browserTop">
    <button class="top-btn" onclick="goHome()">Home</button>
  </div>
  <iframe id="browser"></iframe>
</div>

<script>
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
particles=[];
for(let i=0;i<200;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
speedY:Math.random()*0.6+0.2,
sway:Math.random()*2,
swaySpeed:Math.random()*0.02,
offset:Math.random()*Math.PI*2,
alpha:Math.random()*0.6+0.2
});
}
}

function draw(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{
p.y+=p.speedY;
p.x+=Math.sin(p.y*p.swaySpeed+p.offset)*p.sway;
if(p.y>h){p.y=-10;p.x=Math.random()*w;}
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.fill();
});
requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);
resize();
draw();

const searchBox=document.getElementById("searchBox");
const browser=document.getElementById("browser");
const browserWrap=document.getElementById("browserWrap");
const home=document.getElementById("home");

searchBox.addEventListener("keydown",function(e){
if(e.key==="Enter"){
const query=searchBox.value.trim();
if(query){
home.style.display="none";
browserWrap.style.display="flex";
browser.src="https://html.duckduckgo.com/html/?q="+encodeURIComponent(query);
}
}
});

function goHome(){
browserWrap.style.display="none";
home.style.display="flex";
browser.src="";
searchBox.value="";
}
</script>

</body>
</html>

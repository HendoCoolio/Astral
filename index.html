<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astral</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center,#020408 0%,#000 70%);
}

body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,rgba(32,60,120,0.18),transparent 35%),
radial-gradient(circle at center,rgba(60,100,190,0.08),transparent 55%);
z-index:0;
}

canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* TOP BAR */
.top-bar-wrap{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
z-index:5;
}

.top-bar{
display:flex;
gap:10px;
padding:8px 10px;
border-radius:18px;
background:rgba(22,22,22,0.92);
box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 8px 30px rgba(0,0,0,0.35);
backdrop-filter:blur(8px);
}

.top-icon-btn{
width:42px;
height:42px;
border:none;
border-radius:14px;
background:transparent;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.18s;
}

.top-icon-btn svg{
width:28px;
height:28px;
fill:#f2f2f2;
}

.top-icon-btn:hover{
transform:scale(1.08);
box-shadow:0 0 16px rgba(90,150,255,0.25);
}

/* CENTER */
.center-wrap{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
text-align:center;
}

.title{
font-size:clamp(72px,12vw,130px);
font-weight:800;
background:linear-gradient(90deg,#10264d,#1c4d95,#4f8df0,#1c4d95,#10264d);
background-size:220%;
-webkit-background-clip:text;
color:transparent;
filter:drop-shadow(0 0 20px rgba(42,92,185,0.4));
animation:flow 8s ease-in-out infinite;
}

.subtitle{
font-size:14px;
opacity:0.85;
background:linear-gradient(90deg,#10264d,#4f8df0,#10264d);
-webkit-background-clip:text;
color:transparent;
}

@keyframes flow{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

.search{
width:min(600px,80vw);
padding:15px 20px;
border-radius:999px;
border:none;
outline:none;
background:#121212;
color:white;
font-size:16px;
box-shadow:
0 0 0 1px rgba(60,120,255,0.28),
0 0 20px rgba(60,120,255,0.2);
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<!-- TOP BAR -->
<div class="top-bar-wrap">
  <div class="top-bar">

    <button class="top-icon-btn" onclick="window.location.href='games.html'">
      <svg viewBox="0 0 24 24">
        <path d="M7 7C4.79 7 3 8.79 3 11v2c0 2.21 1.79 4 4 4h1.38c.8 0 1.55.38 2.02 1.03l.8 1.08c.4.54 1.2.54 1.6 0l.8-1.08c.47-.65 1.22-1.03 2.02-1.03H17c2.21 0 4-1.79 4-4v-2c0-2.21-1.79-4-4-4H7z"/>
      </svg>
    </button>

  </div>
</div>

<div class="center-wrap">
  <div class="title">Astral</div>
  <div class="subtitle">brought to you by the creator of quantum arcade</div>
  <input class="search" id="searchBox" placeholder="search the web">
</div>

<script>
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
particles=[];
for(let i=0;i<(w*h)/14000;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
speedY:Math.random()*0.5+0.2,
alpha:Math.random()*0.5+0.2
});
}
}

function draw(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{
p.y+=p.speedY;
if(p.y>h){p.y=0;p.x=Math.random()*w;}
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.fill();
});
requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);
resize();
draw();

/* SEARCH FUNCTION */
const searchBox = document.getElementById("searchBox");

searchBox.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const query = searchBox.value.trim();
    if(query){
      window.location.href = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
    }
  }
});
</script>

</body>
</html>

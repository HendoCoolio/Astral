<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/repo/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <!-- IMPORTANT FOR IPAD / SAFARI -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Unity WebGL Player | R.E.P.O</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: relative;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: #000;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      box-sizing: border-box;
    }

    #unity-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      background: #000;
      touch-action: none;
    }

    #loading-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      text-align: center;
      z-index: 20;
      background: #000;
      padding: 20px;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%);
      width: min(80vw, 420px);
      z-index: 30;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4ea3ff, #8f6bff);
      border-radius: 999px;
      transition: width 0.15s linear;
    }

    #unity-warning {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      max-width: min(92vw, 700px);
      font-family: Arial, sans-serif;
      text-align: center;
      color: black;
    }

    #unity-warning > div {
      border-radius: 12px;
      margin-bottom: 10px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 1024px) {
      #unity-loading-bar {
        bottom: 8%;
        width: min(84vw, 420px);
      }

      #unity-progress-bar-empty {
        height: 16px;
      }
    }
  </style>

  <script>
    window.addEventListener("keydown", (e) => {
      if (e.altKey && e.code === "KeyG") {
        parent.postMessage({ type: "alt-g" }, "*");
      }
    });
  </script>
</head>

<body>
  <div id="app">
    <div id="loading-text">LOADING.</div>

    <div id="unity-container" hidden>
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>
    </div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");
    const loadingText = document.querySelector("#loading-text");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }

      const div = document.createElement('div');
      div.innerHTML = msg;

      if (type === 'error') {
        div.style.background = 'red';
      } else if (type === 'warning') {
        div.style.background = 'yellow';
      } else {
        div.style.background = 'white';
      }

      warningBanner.appendChild(div);

      if (type !== 'error') {
        setTimeout(() => {
          if (div.parentNode) {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }
        }, 5000);
      }

      updateBannerVisibility();
    }

    function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
        let buffers = [];

        function fetchPart(index) {
          if (index >= fileParts.length) {
            const mergedBlob = new Blob(buffers);
            const mergedFileUrl = URL.createObjectURL(mergedBlob);
            resolve(mergedFileUrl);
            return;
          }

          fetch(fileParts[index])
            .then((response) => response.arrayBuffer())
            .then((data) => {
              buffers.push(data);
              fetchPart(index + 1);
            })
            .catch(reject);
        }

        fetchPart(0);
      });
    }

    function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = window.innerWidth;
      const height = window.innerHeight;

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
    }

    function preventPageScrollForGame() {
      document.addEventListener("touchmove", function (e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });

      document.addEventListener("dblclick", function (e) {
        e.preventDefault();
      }, { passive: false });
    }

    preventPageScrollForGame();
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => {
      setTimeout(resizeCanvas, 300);
    });

    Promise.all([
      mergeFiles(getParts("Build/NewestBuild.wasm.gz", 1, 3)),
      mergeFiles(getParts("Build/NewestBuild.data.gz", 1, 16))
    ]).then(([wasmUrl, dataUrl]) => {
      container.hidden = false;

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/NewestBuild.loader.js";

      const config = {
        dataUrl: dataUrl,
        frameworkUrl: buildUrl + "/NewestBuild.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Stupid Game",
        productName: "R.E.P.O",
        productVersion: "0.1",
        showBanner: unityShowBanner
      };

      loadingBar.style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          if (loadingText) loadingText.remove();

          resizeCanvas();
          setTimeout(resizeCanvas, 500);
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    });
  </script>
</body>
</html>

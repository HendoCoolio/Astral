<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astral Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
background:radial-gradient(circle at center,#020408 0%,#000 70%);
}

/* subtle background */
body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,rgba(32,60,120,0.15),transparent 40%);
z-index:0;
}

/* canvas */
canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* TITLE */
.title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);

font-size:clamp(60px,10vw,100px);
font-weight:800;

background:linear-gradient(90deg,#10264d,#1c4d95,#4f8df0,#1c4d95,#10264d);
background-size:220%;
-webkit-background-clip:text;
color:transparent;

animation:flow 8s ease-in-out infinite;
}

@keyframes flow{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

/* FULL WIDTH GRID */
.grid{
position:absolute;
top:160px;
left:0;
width:100%;

display:grid;
grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
gap:30px;

padding:0 40px;
z-index:2;
}

/* GAME BUTTON */
.game{
width:100%;
aspect-ratio:1/1;

border-radius:20px;
background:#121212;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;
transition:0.2s;

border:1px solid transparent;
}

/* HOVER (simple clean) */
.game:hover{
transform:scale(1.05);
border:1px solid #4f8df0;
}

/* placeholder text */
.game span{
font-size:14px;
opacity:0.6;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="title">Games</div>

<div class="grid">

<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>

<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>
<div class="game"><span>Game</span></div>

</div>

<script>
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
particles=[];
for(let i=0;i<(w*h)/14000;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
speedY:Math.random()*0.6+0.2,
alpha:Math.random()*0.5+0.2
});
}
}

function draw(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{
p.y+=p.speedY;
if(p.y>h){p.y=0;p.x=Math.random()*w;}
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.fill();
});
requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);
resize();
draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astral Games</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center, #020408 0%, #000000 70%);
}

/* glow background */
body::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center, rgba(32,60,120,0.18), transparent 35%),
radial-gradient(circle at center, rgba(60,100,190,0.08), transparent 55%);
z-index:0;
}

/* canvas */
canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* TITLE */
.title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);

font-size:clamp(60px,10vw,100px);
font-weight:800;

background:linear-gradient(
90deg,
#10264d,
#1c4d95,
#4f8df0,
#1c4d95,
#10264d
);

background-size:220%;
-webkit-background-clip:text;
color:transparent;

filter:
drop-shadow(0 0 10px rgba(42,92,185,0.45))
drop-shadow(0 0 30px rgba(42,92,185,0.2));

animation:flow 8s ease-in-out infinite;
}

/* title animation */
@keyframes flow{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

/* GRID */
.grid{
position:absolute;
top:160px;
left:50%;
transform:translateX(-50%);

display:grid;
grid-template-columns:repeat(4, 140px);
gap:24px;
z-index:2;
}

/* GAME BUTTON */
.game{
width:140px;
height:140px;

border-radius:24px;
background:#121212;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;
transition:all 0.25s ease;

box-shadow:
0 0 0 1px rgba(60,120,255,0.2),
0 0 14px rgba(60,120,255,0.15);
}

/* hover effect */
.game:hover{
transform:scale(1.08);

box-shadow:
0 0 0 1px rgba(90,150,255,0.4),
0 0 25px rgba(90,150,255,0.4),
0 0 50px rgba(90,150,255,0.2);
}

/* placeholder text */
.game span{
font-size:14px;
opacity:0.7;
}

/* SNOW */
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="title">Games</div>

<div class="grid">

<div class="game"><span>Game 1</span></div>
<div class="game"><span>Game 2</span></div>
<div class="game"><span>Game 3</span></div>
<div class="game"><span>Game 4</span></div>

<div class="game"><span>Game 5</span></div>
<div class="game"><span>Game 6</span></div>
<div class="game"><span>Game 7</span></div>
<div class="game"><span>Game 8</span></div>

</div>

<script>
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

let w, h, particles = [];

function resize(){
w = canvas.width = window.innerWidth;
h = canvas.height = window.innerHeight;
createParticles();
}

function rand(min,max){
return Math.random()*(max-min)+min;
}

function createParticles(){
particles=[];
for(let i=0;i<(w*h)/14000;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:rand(1,2.5),
speedY:rand(0.3,0.8),
sway:rand(0.5,2),
swaySpeed:rand(0.01,0.03),
alpha:rand(0.2,0.7),
offset:Math.random()*Math.PI*2
});
}
}

function draw(){
ctx.clearRect(0,0,w,h);

particles.forEach(p=>{
p.y+=p.speedY;
p.x+=Math.sin(p.y*p.swaySpeed+p.offset)*p.sway;

if(p.y>h){
p.y=-10;
p.x=Math.random()*w;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.fill();
});

requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);
resize();
draw();
</script>

</body>
</html>

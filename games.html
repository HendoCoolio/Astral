<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astral Games</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

/* BACKGROUND */
body{
background:radial-gradient(circle at center,#020408 0%,#000 70%);
}

body::before{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,rgba(40,70,140,0.15),transparent 45%);
z-index:0;
}

/* SNOW */
canvas{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}

/* TITLE */
.title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
font-size:clamp(60px,10vw,100px);
font-weight:800;
background:linear-gradient(90deg,#10264d,#1c4d95,#4f8df0,#1c4d95,#10264d);
background-size:220%;
-webkit-background-clip:text;
color:transparent;
animation:flow 8s ease-in-out infinite;
}

@keyframes flow{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

/* GRID */
.grid{
position:absolute;
top:160px;
left:0;
width:100%;
height:calc(100% - 160px);

display:grid;
grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
gap:30px;

padding:30px 40px;
z-index:2;
}

/* GAME CARD */
.game{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.2s ease;
}

/* ICON BOX */
.icon-box{
width:100%;
aspect-ratio:1/1;
border-radius:20px;
overflow:hidden;
background:#121212;
border:4px solid transparent;
transition:0.2s ease;
}

/* IMAGE */
.icon-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* NAME */
.game-name{
font-size:14px;
color:white;
opacity:0.8;
}

/* HOVER */
.game:hover{
transform:translateY(-5px);
}

.game:hover .icon-box{
border:4px solid #4f8df0;
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="title">Games</div>

<div class="grid">

<!-- STICKMAN HOOK -->
<div class="game" onclick="window.location.href='games/stickman-hook.html'">
  <div class="icon-box">
    <img src="icons/stickman hook png.png">
  </div>
  <div class="game-name">Stickman Hook</div>
</div>

<!-- MINECRAFT PE -->
<div class="game" onclick="window.location.href='games/minecraft-pe.html'">
  <div class="icon-box">
    <img src="icons/minecraft pe.png">
  </div>
  <div class="game-name">Minecraft PE</div>
</div>

<!-- REPO -->
<div class="game" onclick="window.location.href='games/repo.html'">
  <div class="icon-box">
    <img src="icons/repo.png">
  </div>
  <div class="game-name">Repo</div>
</div>

</div>

<script>
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;

particles=[];
for(let i=0;i<200;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*2+1,
speedY:Math.random()*0.6+0.2,
sway:Math.random()*2,
swaySpeed:Math.random()*0.02,
offset:Math.random()*Math.PI*2,
alpha:Math.random()*0.6+0.2
});
}
}

function draw(){
ctx.clearRect(0,0,w,h);

particles.forEach(p=>{
p.y+=p.speedY;
p.x+=Math.sin(p.y*p.swaySpeed+p.offset)*p.sway;

if(p.y>h){
p.y=-10;
p.x=Math.random()*w;
}

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.fill();
});

requestAnimationFrame(draw);
}

window.addEventListener("resize",resize);
resize();
draw();
</script>

</body>
</html>
